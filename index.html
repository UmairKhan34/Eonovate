        class ErrorBoundary extends React.Component {
            state = { hasError: false };
            static getDerivedStateFromError() { return { hasError: true }; }
            componentDidCatch(error, info) { console.error('ErrorBoundary caught:', error, info); }
            render() {
                if (this.state.hasError) {
                    return <div className="text-center text-white py-10">Something went wrong. Please refresh the page.</div>;
                }
                return this.props.children;
            }
        }

                    if (section) {
                        console.log(`Found section: ${sectionId}`);
                        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else {
                        console.warn(`Section ${sectionId} not found, scrolling to bottom`);
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }
                }, 100);
            } catch (error) {
                console.error('Scroll error:', error);

        // Hero Section Component
        const HeroSection = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                try {
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    const renderer = new THREE.WebGLRenderer({ canvas: canvasRef.current, alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                    const particlesGeometry = new THREE.BufferGeometry();
                    const particleCount = 1000;
                    const posArray = new Float32Array(particleCount * 3);
                    for (let i = 0; i < particleCount * 3; i++) {
                        posArray[i] = (Math.random() - 0.5) * 10;
                    }
                    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                    const material = new THREE.PointsMaterial({
                        size: 0.015,
                        color: 0x00E0FF,
                        transparent: true,
                        opacity: 0.9,
                    });
                    const particles = new THREE.Points(particlesGeometry, material);
                    scene.add(particles);
                    camera.position.z = 5;

                    const animate = () => {
                        if (!canvasRef.current) return;
                        requestAnimationFrame(animate);
                        particles.rotation.y += 0.0015;
                        renderer.render(scene, camera);
                    };
                    animate();

                    const handleResize = () => {
                        if (!canvasRef.current) return;
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                    };
                    window.addEventListener('resize', handleResize);
                    return () => {
                        window.removeEventListener('resize', handleResize);
                        renderer.dispose();
                    };
                } catch (error) {
                    console.error('HeroSection error:', error);
                }
            }, []);

        // Impact Section Component with Counters
        const ImpactSection = () => {
            const impacts = [
                { stat: "40+", target: 40, description: "Projects Completed", ref: useRef(null) },
                { stat: "4+", target: 4, description: "Years of Experience", ref: useRef(null) },
                { stat: "15+", target: 15, description: "Happy Clients", ref: useRef(null) },
            ];

            useEffect(() => {
                try {
                    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
                        gsap.registerPlugin(ScrollTrigger);

                        const animateCounter = (element, target) => {
                            gsap.fromTo(
                                element,
                                { innerText: 0 },
                                {
                                    innerText: target,
                                    duration: 1.5,
                                    ease: 'power2.out',
                                    snap: { innerText: 1 },
                                    onUpdate: function () {
                                        element.innerText = Math.floor(this.targets()[0].innerText) + '+';
                                    }
                                }
                            );
                        };

                        ScrollTrigger.create({
                            trigger: '#impact',
                            start: 'top 95%',
                            end: 'bottom 5%',
                            onEnter: () => {
                                impacts.forEach(({ ref, target }) => {
                                    if (ref.current) animateCounter(ref.current, target);
                                });
                            },
                            onEnterBack: () => {
                                impacts.forEach(({ ref, target }) => {
                                    if (ref.current) animateCounter(ref.current, target);
                                });
                            },
                        });
                    } else {
                        console.warn('GSAP or ScrollTrigger not loaded');
                    }
                } catch (error) {
                    console.error('ImpactSection counter error:', error);
                }

        // Case Studies Section Component

                    industry: "ERP Solutions",

                {

                {

                    industry: "Remittance / Fintech",

                },
                {
    title: "Unlockd",
    description: "Unlockd is a Web3 platform that allows NFT holders to unlock instant liquidity without selling their assets. By bridging NFTs with DeFi, it gives users the freedom to borrow against their digital collectibles while still maintaining ownership.",

},
               {

            return (
                <section id="projects" className="py-16 bg-[var(--bg-light)]">
                    <div className="container mx-auto px-4">

                        <div className="slider-container">

                                        <div className="slide-content">
                                            <h3 className="font-bold">{slide.title}</h3>
                                            <p>{slide.description}</p>

                            <div className="slider-controls">
                                <div className="slider-btn" onClick={() => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length)} aria-label="Previous slide">
                                    <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="var(--primary)">

            );
        };

        // Contact Section Component
        const ContactSection = () => {
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [errors, setErrors] = useState({});
            const [success, setSuccess] = useState(false);

            const validateForm = () => {
                const newErrors = {};
                if (!formData.name.trim()) newErrors.name = 'Fill this';
                if (!formData.email.trim()) newErrors.email = 'Fill this';
                else if (!/\S+@\S+\.\S+/.test(formData.email)) newErrors.email = 'Invalid email format';
                if (!formData.message.trim()) newErrors.message = 'Fill this';
                return newErrors;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const validationErrors = validateForm();
                if (Object.keys(validationErrors).length > 0) {
                    setErrors(validationErrors);
                    return;
                }
                try {
                    const response = await fetch('https://formspree.io/f/mdkzkvdw', {
                        method: 'POST',
                        headers: { Accept: 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData),
                    });
                    if (response.ok) {
                        setFormData({ name: '', email: '', message: '' });
                        setErrors({});
                        setSuccess(true);
                        setTimeout(() => setSuccess(false), 5000);
                    } else {
                        throw new Error('Form submission failed');
                    }
                } catch (error) {
                    console.error('Form submission error:', error);
                    alert('Error sending message. Please try again later.');
                }
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
                setErrors({ ...errors, [name]: '' });
            };

            return (
                <section id="contact" className="py-16 bg-[var(--bg-dark)]">
                    <div className="container mx-auto px-4">
                        <h2 className="text-center text-white mb-10">Get in Touch</h2>
                        <div className="max-w-md mx-auto bg-[var(--secondary)] p-6 rounded-xl shadow-lg">
                            <form onSubmit={handleSubmit}>
                                <div className="mb-4">
                                    <label htmlFor="name" className="block text-sm font-medium mb-1 text-[var(--text-dark)]">Name</label>
                                    <input
                                        type="text"
                                        id="name"
                                        name="name"
                                        value={formData.name}
                                        onChange={handleChange}
                                        className={`w-full p-2 border rounded-lg focus:ring-2 focus:ring-[var(--accent)] ${errors.name ? 'error' : ''}`}
                                    />
                                    {errors.name && <p className="error-message">{errors.name}</p>}
                                </div>
                                <div className="mb-4">
                                    <label htmlFor="email" className="block text-sm font-medium mb-1 text-[var(--text-dark)]">Email</label>
                                    <input
                                        type="email"
                                        id="email"
                                        name="email"
                                        value={formData.email}
                                        onChange={handleChange}
                                        className={`w-full p-2 border rounded-lg focus:ring-2 focus:ring-[var(--accent)] ${errors.email ? 'error' : ''}`}
                                    />
                                    {errors.email && <p className="error-message">{errors.email}</p>}
                                </div>
                                <div className="mb-4">
                                    <label htmlFor="message" className="block text-sm font-medium mb-1 text-[var(--text-dark)]">Message</label>
                                    <textarea
                                        id="message"
                                        name="message"
                                        rows="4"
                                        value={formData.message}
                                        onChange={handleChange}
                                        className={`w-full p-2 border rounded-lg focus:ring-2 focus:ring-[var(--accent)] ${errors.message ? 'error' : ''}`}
                                    ></textarea>
                                    {errors.message && <p className="error-message">{errors.message}</p>}
                                </div>
                                <button type="submit" className="w-full bg-[var(--accent)] text-[var(--primary)] py-2 rounded-lg hover:bg-[var(--text-light)] transition-all">Send Message</button>
                            </form>
                            {success && <div className="toast show">Message sent successfully!</div>}
                        </div>
                    </div>
                </section>
            );
        };

        // Footer Component
        const Footer = () => (
            <footer className="py-12 bg-[var(--primary)]">
                <div className="container mx-auto px-4">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div>
                            <img src="assets/12.png" alt="Eonovate Logo" className="h-10 mb-4" loading="lazy" />
                            <p className="text-[var(--text-light)] text-sm">Pioneering tech solutions for a smarter future.</p>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4">Quick Links</h3>
                            <ul className="space-y-2">
                                <li><a href="#home" className="text-[var(--text-light)] hover:text-[var(--accent)] text-sm" onClick={() => scrollToSection('#home')}>Home</a></li>
                                <li><a href="#services" className="text-[var(--text-light)] hover:text-[var(--accent)] text-sm" onClick={() => scrollToSection('#services')}>Services</a></li>
                                <li><a href="#projects" className="text-[var(--text-light)] hover:text-[var(--accent)] text-sm" onClick={() => scrollToSection('#projects')}>Case Studies</a></li>
                                <li><a href="#team" className="text-[var(--text-light)] hover:text-[var(--accent)] text-sm" onClick={() => scrollToSection('#team')}>Team</a></li>
                                <li><a href="#contact" className="text-[var(--text-light)] hover:text-[var(--accent)] text-sm" onClick={() => scrollToSection('#contact')}>Get in Touch</a></li>
                            </ul>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4">Contact Us</h3>
                            <p className="text-[var(--text-light)] text-sm mb-2">Email: sales@eonovate.com</p>
                        </div>
                        <div>
                            <h3 className="text-white font-semibold mb-4">Follow Us</h3>
                            <div className="flex gap-4">
                                <a href="https://www.facebook.com/profile.php?id=61573904992775" target="_blank" rel="noopener noreferrer" className="social-icon" aria-label="Facebook">
                                    <svg className="w-5 h-5 text-[var(--text-light)]" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                                    </svg>
                                </a>
                                <a href="https://www.instagram.com/eonovateofficial?igsh=MWU1YjF6NTJ4eWpvOA==" target="_blank" rel="noopener noreferrer" className="social-icon" aria-label="Instagram">
                                    <svg className="w-5 h-5 text-[var(--text-light)]" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5a4.25 4.25 0 0 0-4.25-4.25h-8.5zm4.25 2.5a6 6 0 1 1 0 12 6 6 0 0 1 0-12zm0 1.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9zm5.75-.75a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                                    </svg>
                                </a>
                                <a href="https://www.linkedin.com/company/eonovate/" target="_blank" rel="noopener noreferrer" className="social-icon" aria-label="LinkedIn">
                                    <svg className="w-5 h-5 text-[var(--text-light)]" fill="none" viewBox="0 0 24 24">
                                        <path stroke="currentColor" strokeWidth="2" d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
                                        <circle cx="4" cy="4" r="2" stroke="currentColor" strokeWidth="2"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                    <div className="mt-6 text-center text-[var(--text-light)] text-sm">
                        <p>© 2025 Eonovate. All rights reserved.</p>
                    </div>
                </div>
            </footer>
        );

        // Main App Component
        const App = () => {
            useEffect(() => {
                try {
                    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
                        gsap.registerPlugin(ScrollTrigger);
                        const sections = [
                            {
                                id: '#home',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelector('.hero-text'),
                                        { opacity: 0, scale: 0.8, y: 100 },
                                        { opacity: 1, scale: 1, y: 0, duration: 1, ease: 'power3.out' }
                                    );
                                }
                            },
                            {
                                id: '#services',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelectorAll('.card'),
                                        { opacity: 0, x: -50, stagger: 0.2 },
                                        { opacity: 1, x: 0, stagger: 0.2, duration: 0.8, ease: 'power2.out' }
                                    );
                                }
                            },
                            {
                                id: '#impact',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelectorAll('.impact-card'),
                                        { opacity: 0, y: 50, rotateX: 45 },
                                        { opacity: 1, y: 0, rotateX: 0, duration: 1, stagger: 0.3, ease: 'back.out(1.7)' }
                                    );
                                }
                            },
                            {
                                id: '#projects',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelector('.slider-container'),
                                        { opacity: 0, scale: 0.9 },
                                        { opacity: 1, scale: 1, duration: 1, ease: 'power4.out' }
                                    );
                                }
                            },
                            {
                                id: '#clients',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelectorAll('.card'),
                                        { opacity: 0, x: 50, stagger: 0.2 },
                                        { opacity: 1, x: 0, stagger: 0.2, duration: 0.8, ease: 'power2.out' }
                                    );
                                }
                            },
                            {
                                id: '#process',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelectorAll('.card'),
                                        { opacity: 0, y: -50, stagger: 0.2 },
                                        { opacity: 1, y: 0, stagger: 0.2, duration: 0.8, ease: 'elastic.out(1, 0.5)' }
                                    );
                                }
                            },
                            {
                                id: '#engagement',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelectorAll('.card'),
                                        { opacity: 0, scale: 0.7, stagger: 0.2 },
                                        { opacity: 1, scale: 1, stagger: 0.2, duration: 0.8, ease: 'power3.out' }
                                    );
                                }
                            },
                            {
                                id: '#team',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelectorAll('.card'),
                                        { opacity: 0, x: 50, rotateY: 45, stagger: 0.2 },
                                        { opacity: 1, x: 0, rotateY: 0, stagger: 0.2, duration: 0.8, ease: 'power2.out' }
                                    );
                                }
                            },
                            {
                                id: '#contact',
                                animation: (section) => {
                                    gsap.fromTo(
                                        section.querySelector('.max-w-md'),
                                        { opacity: 0, y: 100, scale: 0.9 },
                                        { opacity: 1, y: 0, scale: 1, duration: 1, ease: 'power4.out' }
                                    );
                                }
                            }
                        ];

                        sections.forEach(({ id, animation }) => {
                            const section = document.querySelector(id);
                            if (section) {
                                ScrollTrigger.create({
                                    trigger: section,
                                    start: 'top 95%',
                                    end: 'bottom 5%',
                                    onEnter: () => {
                                        section.classList.add('visible');
                                        animation(section);
                                    },
                                    onEnterBack: () => {
                                        section.classList.add('visible');
                                        animation(section);
                                    },
                                    onLeave: () => section.classList.remove('visible'),
                                    onLeaveBack: () => section.classList.remove('visible')
                                });
                            } else {
                                console.warn(`Section ${id} not found`);
                            }
                        });
                    } else {
                        console.warn('GSAP or ScrollTrigger not loaded');
                    }
                } catch (error) {
                    console.error('App initialization error:', error);
                }

                return () => {
                    if (typeof ScrollTrigger !== 'undefined') {
                        ScrollTrigger.getAll().forEach(trigger => trigger.kill());
                    }
                };
            }, []);

            return (
                <ErrorBoundary>
                    <Navbar />
                    <HeroSection />
                    <ServicesSection />
                    <ImpactSection />
                    <CaseStudiesSection />
                    <ClientsSection />
                    <ProcessSection />
                    <EngagementSection />
                    <TeamSection />
                    <ContactSection />
                    <Footer />
                </ErrorBoundary>
            );
        };

        // Render the App
        try {
            const root = document.getElementById('root');
            if (root) {
                ReactDOM.render(<App />, root);
            } else {
                console.error('Root element not found');
            }
        } catch (error) {
            console.error('Render error:', error);
        }
    </script>
</body>
</html>
